name: Quality

on:
  push:
    branches: [main, kmp-rewrite]
  pull_request:
    branches: [main, kmp-rewrite]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Temurin JDK 17 — pinned distribution for reproducible Gradle builds.
      # cache: gradle activates actions/setup-java's built-in Gradle cache
      # (caches ~/.gradle/caches + ~/.gradle/wrapper keyed on Gradle wrapper
      # properties). Invalidates automatically on gradle-wrapper.properties
      # or build.gradle.kts changes.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ./gradlew check runs all enabled verification tasks on all targets
      # that the ubuntu-latest runner can build (JVM-side only — no Xcode
      # toolchain here). This covers commonTest (via allTests) and jvmTest
      # for the shared/ module (NFR-07, MC-03).
      - name: Run Gradle checks
        run: ./gradlew check --no-daemon

      # Structural audit: asserts the full M1 target tree is intact
      # (Gradle root files, shared/ source sets, iosApp/ shell, ExportOptions
      # at repo root, no Flutter residue, kmp-rewrite in both workflow triggers,
      # etc.). Fails fast with a descriptive message identifying the first
      # failing check. Script is authored in TASK-07 (Wave 4 of the M1 plan);
      # this step is a forward reference — it will be a no-op until the script
      # exists, but is placed here now so the CI step is present when the
      # script lands. See §6 (plan changes) for the cross-file step log.
      - name: M1 structural gate
        run: bash tool/m1_gate.sh
