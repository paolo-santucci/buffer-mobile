short-plan:
  feature: |
    KMP Milestone 2 (Shared Domain & Data). Port Foglietto's recovery, settings, and pure-editor
    domain/data logic from the Flutter behavioral reference (git history at `main`) into the
    platform-neutral `shared/` Kotlin module, preserving behavioral contracts EXACTLY, with the
    Dart test suites ported as the oracle, all green on `./gradlew check` (JVM-only on Linux, no
    Apple/Flutter dependency — NFR-07). Scope FR-03..FR-10 + FR-18:
    RECOVERY domain — RecoveryFilename parser (ms fixed-width grammar YYYY-MM-DDTHH-MM-SS-mmmZ,
    rejects 6-digit µs, never throws), RecoveryPreview (512-byte lenient head, `\s*\n+\s*` collapse
    to single space, hard-cut ≤80 UTF-16 code units surrogate-safe, no ellipsis), RecoveryNote
    entity (path/savedAt/preview; savedAt from filename never mtime), RecoveryRepository port.
    RECOVERY data — okio-backed FileRecoveryRepository (save/list/read/delete/deleteAll/trim;
    fixed-width stem; collision -1/-2 never overwrite; lexicographic==chronological order NEVER
    mtime; no-op-guard on absent dir; tolerate vanished/changed files; keep-newest-10 trim).
    expect/actual RecoveryDirProvider (iOS actual = Documents dir; JVM/test actual = temp dir).
    SaveBufferToRecovery use case — trim-guard (empty/whitespace → no I/O), RAW text saved, trim(10)
    after save. SETTINGS — AppSettings (MVP-trimmed: colorScheme enum + fontSizeIndex 21-slot 6..38
    default idx 8 only) + SettingsRepository port + multiplatform-settings impl (load never throws on
    absent/wrong-type, safe enum parse via explicit when (no valueOf/byName), clamp fontSizeIndex).
    EDITOR — LineIndent (tab-vs-two-space unit, position-stable re-anchoring, 3-way outdent delta) +
    ListContinuation (bullet/ordered grammar; `- [x]`→`- [ ]`; z/Z ends no-wraparound; empty item
    ends list + deletes marker line checking two-above; leading whitespace preserved) ported verbatim.
    [ASSUMED] OQ-02: DROP useMonospaceFont + all MVP-excluded settings (spelling/emergency/lineLength).
    [ASSUMED] OQ-07: fresh KMP store, keep keys 'color-scheme'/'font-size'. Recovery always-on (FR-18):
    emergencyRecoveryEnabled gate dropped; keep=10 literal at use-case boundary. Kotlin okio I/O is
    blocking → the Dart async-save/saveSync split collapses to one synchronous shared save; suspend
    bridging is a SwiftUI-boundary concern (M3), not shared-internal. R-05/R-06/R-14 in scope.
