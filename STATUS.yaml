recently-completed:
  - date: 2026-06-23
    summary: "v1.0.0-rc18 SHIPPED on kmp-rewrite (HEAD, tag v1.0.0-rc18 -> iOS deploy_testflight run 28046014746 GREEN, signed IPA uploaded). CORRECT Apple-Notes morph model. User clarified after rc17: the AN/Claude/Calendar/Drafts pattern is a pill of 2-3 buttons where ONLY ONE (the …) deforms into a liquid drop then the menu rect; the others STAY. rc16/rc17 swapped the whole pill (Share vanished). swift-frontend-engineer's first rc18 cut kept Share INSIDE the GlassEffectContainer with the panel; a bug-hunter adversarial review CONFIRMED Share metaball-glued into the panel top-left (the rc15 artifact) + an empty notch. FINAL FIX: pull Share OUT of the container (own .buttonStyle(.glass)); the GlassEffectContainer holds EXACTLY the overflow XOR panel pair (identical to the user's proven LiquidMenuDemo topology — no glue since coalescence is per-container, no frame-race since one child). Morph pair anchored via .overlay(.topTrailing) on a fixed 44x44 Color.clear spacer so the panel grows down/left from the … while Share's HStack slot stays invariant. … uses .glassEffect(.regular.interactive(),in:.capsule) for the squish/refractive drop (safe on a single button). MenuBubble gained dismissAnimation so the recovery-row close morphs too. Gates m4 13/13, sp_chrome_morph 8/8. Code+symptom, NOT a device run."
  - date: 2026-06-23
    summary: "v1.0.0-rc17 SHIPPED on kmp-rewrite (commit on HEAD, tag v1.0.0-rc17 -> iOS deploy_testflight run 28042542700 in progress). APPLE-NOTES whole-capsule morph. User device-tested rc16: morph 'somewhat works' but not the Apple Notes feel — Share abruptly vanished on open instead of the whole [Share|…] capsule deforming as one liquid blob. User chose Option C (keep the fused single capsule; the WHOLE capsule morphs into the panel; Share absorbed when open). FIX (swift-frontend-engineer): moved .glassEffectID(glassID,in:glassNamespace) from the overflow Button to the OUTER HStack in TopPill.body — the HStack frame spans both buttons, so the morph source/destination is the FULL capsule width; the whole blob stretches into the panel and contracts back. NO tap regression: the HStack carries only .glassEffectID (a morph hint), NOT .glassEffect, so no merged interactive group / no tap-swallow; both buttons keep .buttonStyle(.glass) + .glassEffectUnion. ChromeOverlay/MenuBubble unchanged (whole-view swap + .transition(.identity) + spacing 35). Reference: user's validated LiquidMenuDemo.swift + 'Morphing Nativo Liquid Glass.md' (native GlassEffectContainer + glassEffectID, NOT matchedGeometryEffect). Gates m4 13/13, sp_chrome_morph 8/8. Code+symptom, NOT a device run."
  - date: 2026-06-23
    summary: "v1.0.0-rc16 SHIPPED on kmp-rewrite (commit 4f45825, tag v1.0.0-rc16 -> iOS deploy_testflight run 28040336633). DEFINITIVE pill<->menu glass-morph fix. rc15 (eeeb7a0, mislabeled 'comments for clarity') was a behavioral rewrite that regressed 3 ways: uneven resting pill, pill split on open (Share slid right + panel expanded under it), panel landed mid-screen then jumped up on close. ROOT CAUSE (swift-frontend-engineer + bug-hunter, independently concurring): rc15 replaced the whole-view swap with a persistent-TopPill + appended-panel VStack and deleted .glassEffectUnion. No union -> two unequal glass blobs; overflow removed from a surviving trailing-aligned HStack -> Share reflows right + Share's persistent glass metaball-glues under the panel; overflow re-inserted into an existing HStack on close -> its morph-destination frame unresolved when the morph fires -> mid-screen-then-snap. FIX: ChromeOverlay pillAndBubble reverted to whole-view swap inside GlassEffectContainer(spacing:35) + .transition(.identity) on both branches (kills SwiftUI's default opacity fade competing with the morph — the rc14 'almost fixed' residual); TopPill renders both buttons unconditionally + restored pillUnionID + .glassEffectUnion on both (visual-only, orthogonal to .glassEffectID); rewrote the misleading header comment boxes. Gates m4 13/13, sp_chrome_morph 8/8. Diagnosis from code+symptom, NOT a device run."
  - date: 2026-06-23
    summary: "v1.0.0-rc9 SHIPPED on kmp-rewrite (commit 111d1d5). ROOT-CAUSE FIX for the overflow menu that 'bounced but never opened' on-device after rc8: rc8 added .glassEffect(.regular.interactive(), in:.capsule) to TopPill's Share+overflow HStack. .interactive() installs a touch-reactive gesture on the glass capsule itself; applied to the multi-button CONTAINER it won gesture arbitration against the inner .buttonStyle(.plain) controls — pill squished on touch but the overflow toggle never fired. Fix: drop .interactive(). ALSO: declared ITSAppUsesNonExemptEncryption=false in Info.plist. (rc10-rc15 were on-device debug iterations between rc9 and the rc16 definitive fix.)"
  - date: 2026-06-23
    summary: "v1.0.0-rc8 SHIPPED on kmp-rewrite (commit c2a8a55, tag v1.0.0-rc8 -> iOS run 28003086554 + Quality 28003085963). THREE fixes in one commit. (1) RECOVERY always-empty submenu ROOT-CAUSE FIX (shared): IosRecoveryFactory.kt millis clamp — on real iOS NSCalendar returns NSDateComponentUndefined for nanoseconds; nanosecond/1_000_000 serialised to a 13-digit stem RecoveryFilename.parse rejected, so list() silently skipped EVERY file. Fix: coerceIn(0,999); :shared:jvmTest GREEN. (2) Pill<->panel GLASS MORPH: GlassEffectContainer(spacing:35) metaball threshold; .bouncy(0.45,0.15) at both write-sites; single glass bearer per morphing shape (inner buttons -> .plain). (3) APPLE-NOTES CHROME RESTYLE: removed per-icon gray glass background; icons .imageScale(.large); ChromeMetrics.iconScaleWeight .regular. NOTE: rc8's container-level .interactive() turned out to break the overflow tap on-device — fixed in rc9."

