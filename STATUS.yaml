known-issues:
  - severity: warning
    description: "FR-19 (inbound Share Extension + App Group) DEFERRED out of M5: the app cannot yet receive shared text from the iOS share sheet. Needs operator-only provisioning (2nd bundle id, 2nd profile, App Group registration, 9th CI secret) before the target can be signed/shipped."
    impact: medium
    workaround: "Fast-follow folded into M7 signing work; tracked in LP §8 [LP-IMPACT] and next-steps. Outbound share (ShareLink) is unaffected and works."
  - severity: warning
    description: "M5 lifecycle save (ScenePhase.background) verified only via CI-simulator unit tests; not yet exercised by a real backgrounding/termination on a physical device. applicationWillTerminate is best-effort (R-11)."
    impact: medium
    workaround: "Device-validate the background-save + cold-start-empty behavior on a real device."
  - severity: warning
    description: "KMP chrome interactions are gate-invisible and validated only by source-scan gates + CI-simulator tests; never confirmed on a real iOS 26 device. The pill<->menu glass morph (rc18: only … morphs, Share outside the container) and the Recent-notes recovery submenu need on-device confirmation. The morph has regressed/iterated MANY times on-device (rc6 no-morph, rc8 interactive-glass tap capture, rc15 split/mid-screen, rc16/rc17 wrong-element/Share-vanish, rc18-cut1 Share-glues-to-panel caught pre-ship by bug-hunter) — almost every regression was only caught on a real device; the same class could recur."
    impact: medium
    workaround: "Run on a connected device before relying on TestFlight; rc18 needs: only-…-morphs + Share-persists-no-glue-no-notch + close-morphs-back + recovery-list visual confirmation."
  - severity: warning
    description: "Recovery notes saved by any build BEFORE v1.0.0-rc8 have a malformed (13-digit millis) filename that RecoveryFilename.parse rejects, so they will NOT appear in the Recent-notes submenu even after the rc8 fix. Only notes saved by rc8+ builds are listed."
    impact: low
    workaround: "Acceptable for ephemeral recovery notes. If old files must be recoverable, add a tolerant migration path in list()/the parser (not done — would risk the deliberate 6-digit-microsecond rejection in RecoveryFilenameTest)."
  - severity: warning
    description: "Recovery/settings key strings transcribed best-effort, not cross-checked against the live upstream GNOME Buffer gschema. A mismatch means stored values are never found."
    impact: medium
    workaround: "Cross-check keys against upstream gschema; fix is one line per key in AppSettings."
