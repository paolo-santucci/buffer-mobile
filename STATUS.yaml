long-plan:
  feature: |
    Rewrite Foglietto (currently Flutter) as a Kotlin Multiplatform project — iOS-only MVP, a first-class iOS 26 Liquid Glass app.
    ARCHITECTURE: shared Kotlin module (shared/) = domain (use cases) + data (persistence) ONLY, no presentation layer, strictly
    platform-neutral (expect/actual) because Android is a planned next target. Native SwiftUI app (iosApp/) owns all presentation
    state via @Observable Swift view models calling shared suspend use cases; native text editing stays SwiftUI. Persistence: settings
    via multiplatform-settings; 10-note recovery as flat .txt files via okio in the iOS Documents directory, EXPOSED to the Files app
    (UIFileSharingEnabled + LSSupportsOpeningDocumentsInPlace).
    CODEBASE: rewrite in-place on a new branch; repo becomes KMP (shared/ + iosApp/); Flutter sources removed (recoverable via git
    history, used as behavioral reference). Brand/bundle-id/TestFlight/CI secrets retained.
    MVP SCOPE (iOS only, parity minus spellcheck and find/replace): ephemeral buffer (gone on close; clear on fresh launch, save on
    background/detach); 10-note recovery ALWAYS ON (no toggle) — files in Documents dir, visible in Files app, restore via an inline
    expandable submenu INSIDE the menu bubble (Apple Notes 'Note recenti' pattern); share-sheet inbound text (cold-start no-flash seed);
    ALL settings INSIDE the menu bubble (no separate screen): font-size control + pinch-to-zoom, theme via description-only picker
    (System/Light/Dark), Dynamic Type aware; bottom toolbar = copy, paste, close-keyboard, indent, de-indent (no separate keyboard
    accessory bar); Markdown list auto-continuation; EN+IT localization (system locale, English fallback); light/dark themes + per-theme
    launch surface. EXCLUDED: spellcheck, find/replace (no Find affordance anywhere).
    HARD CONSTRAINTS: min iOS 26.0, native Liquid Glass unconditionally (no fallback branch); Liquid Glass compliance with Apple's
    official 'App design and UI' guidance (https://developer.apple.com/documentation/technologyoverviews/app-design-and-ui) — native
    SwiftUI Liquid Glass APIs (.glassEffect, GlassEffectContainer, glass button/toolbar styles) not hand-rolled blur; glass on the
    control/navigation layer ONLY, never content; respect concentricity/grouping/placement; honor Reduce Transparency, Increase
    Contrast, Reduce Motion fallbacks; standard SwiftUI controls adopt system glass automatically.
    DEFINITION OF DONE: KMP build signed and uploaded to TestFlight via a reworked GitHub Actions pipeline (Gradle -> shared XCFramework
    -> xcodebuild archive -> sign with existing secrets -> altool upload to the same ASC app), feature-complete against the scope above.
  slug: "kotlin-multiplatform-rewrite"
  auto: false
  request-type: feature
