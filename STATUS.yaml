short-plan:
  feature: |
    Restyle Foglietto's iOS chrome to match Apple Notes (iOS 26) VISUAL LANGUAGE ONLY (keep all Foglietto
    functions + menu contents), and FIX the pill->menu animation so the pill visibly TRANSFORMS into the menu
    instead of a popup appearing below it.
    1. TOP PILL: keep the single top-right glass CAPSULE (share square.and.arrow.up + ellipsis); NO back chevron.
       Restyle to Apple-Notes glass-control look (capsule shape/dimensions, SF-Symbol icon weight/sizing). The
       WHOLE pill is the morph source.
    2. MORPH FIX (verified w/ swift-swiftui-frontend-engineer + online refs): keep native GlassEffectContainer +
       @Namespace + .glassEffectID("chrome.morph") (gate-required; .popover stays forbidden). REMOVE the competing
       explicit MenuBubble .transition(.scale 0.9 anchor:.topTrailing + .opacity) in ChromeOverlay.swift:200-208
       (it forces the popup feel and fights the geometry morph). Let glassEffectID own the geometry; drive BOTH
       toggle write-sites (TopPill overflow toggle + ChromeOverlay tap-catcher) with under-damped spring
       withAnimation(.spring(response:0.5, dampingFraction:0.6)); fade-in ONLY the inner menu rows via
       .transition(.opacity). REJECT the doc's .ultraThinMaterial/matchedGeometryEffect approach.
    3. BOTTOM TOOLBAR: keep Foglietto's 5 functions + order (hide-keyboard, copy, paste, outdent, indent);
       restyle the glass capsule dimensions/icon-weight/spacing to match Apple Notes' bottom toolbar. No compose
       button.
    4. MENU PANEL: style container/rows (rounded glass panel, row typography, dividers, leading icons) to read
       like Apple Notes' menu while keeping Foglietto's richer controls (theme picker, font stepper, about,
       recent-notes submenu).
    5. PRESERVE all gate invariants: native glass only (m4_gate), GlassEffectContainer present + no .popover
       (sp_chrome_morph_gate), glass scoped to Chrome/, no #available, reduce-motion branch, 44pt tap targets,
       lineFragmentPadding=0, static editor top-inset (track any pill dimension change).
