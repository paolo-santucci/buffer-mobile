short-plan:
  feature: |
    KMP Milestone 5 (Share & Lifecycle) — iOS-only MVP. SCOPED to the three Must FRs that are
    CI-verifiable on the main app target with no external provisioning:
      FR-14 — synchronous recovery save at ScenePhase.background (wrapped in beginBackgroundTask;
              NO async Task); .active resets the ephemeral buffer + clears the per-session burst
              guard; .inactive no-op; best-effort applicationWillTerminate save (R-11 unreliable,
              documented). Reuses createIosRecoveryRepository() + SaveBufferToRecovery (synchronous,
              returns path?/null). Save path lives OUTSIDE BufferViewModel (FR-12 / m4_gate check 5).
      FR-17 — UIFileSharingEnabled + LSSupportsOpeningDocumentsInPlace in Info.plist.
      FR-20 — outbound ShareLink in TopPill disabled on empty buffer (already met in M4; lock w/ gate).
    DEFERRED carryforward: FR-19 (inbound Share Extension + App Group, a "Should") — needs a 2nd
    bundle id, 2nd provisioning profile, App Group registration, and a 9th GitHub CI secret
    (OQ-01/OQ-06, R-04 High/High): user-only external resources that do not exist yet; building it
    now fails CI signing irrecoverably. Deferred to a fast-follow once provisioned. LP DoD permits
    "explicitly deferred".
