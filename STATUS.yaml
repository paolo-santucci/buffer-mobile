known-issues:
  - severity: warning
    description: "KMP M3 BufferEditor uses UIColor.systemBackground for --view-bg-color (no named design-token asset wired yet). CANON GAP carried from M3; functional but not the canonical token."
    impact: low
    workaround: "Wire a named color asset in Assets.xcassets and switch to UIColor(named: \"ViewBgColor\") during M4."
  - severity: warning
    description: "Recovery shared_preferences/settings key strings (incl. 'color-scheme', 'font-size') transcribed best-effort, not cross-checked against the live upstream GNOME Buffer gschema. A mismatch means stored values are never found."
    impact: medium
    workaround: "Cross-check keys against upstream gschema; fix is one line per key in AppSettings."
  - severity: warning
    description: "KMP on-device integration tests not yet executed (no emulator/device in this environment); iosAppTests run on the CI simulator only. Surrogate-pair offset + list-continuation behavior verified via CI XCTest, not a physical device."
