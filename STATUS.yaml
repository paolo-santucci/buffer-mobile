    summary: "KMP Milestone 3 (SwiftUI Editor Core) BUILT, CI-GREEN & CLOSED on branch kmp-rewrite. Build (8 waves, commit 30fd4d3) was complete but its LP marker was unflipped and CI red; this session drove M3 to green and closed it. UITextView editor via UIViewRepresentable + shouldChangeTextIn pre-edit hook (no post-edit diffing/latch), single UTF-16 offset boundary (TextOffsetBridge; shared Kotlin sole authority), @Observable BufferViewModel calling shared use cases, ephemeral buffer, font-size + pinch-to-zoom (all pinch math in shared PinchZoom). Four CI-red fixes: (1) M1 gate (j) commonMain-purity grep matched a comment in PinchZoom.kt naming UIKit/Foundation/SwiftUI -> reworded (791aafa). (2) Duplicate StubSettingsRepository across two iosAppTests files -> made the BufferViewModelTests copy private (791aafa). (3) Swift-6 strict-concurrency: BufferEditorCoordinatorTests/EditorPinchModifierTests + free makeCoordinator helper marked @MainActor (construct @MainActor UIViewRepresentable/ViewModifier, send non-Sendable VM/stub) (248782d). (4) EditorPinchModifier gesture anchor was @State Int? — discarded outside a SwiftUI render so the seam never armed; moved to a reference-type PinchGestureState held in @State (persists across body re-evals AND direct seam calls); also corrected the EC-04 empty-marker test fixture from a lone first-line '- ' (which hits the intentional E-I2 quirk: lone first-line marker CONTINUES) to a real continued list '- a\n- ' so termination actually fires (afaacba). CI GREEN: Quality (./gradlew check + M1 gate 12/12) + iOS run 27897956409 (build_ios archive = MC-02; test_ios 48 tests, 0 failures, false-green guard pass = MC-03). Local: m3_gate 16/16, ./gradlew check EXIT 0. Spec+plan archived; §6.2 Spec Impact omitted (faithful port of already-canonized text-editor/typography slices; no canon delta) -> no pending-consolidation push. LP §8 already carries the M3 LP-IMPACT (iosMain createIosSettingsRepository factory). M3 marker flipped to [x]